name: fairy_tales_app
description: A magical platform for creating, editing, narrating, and playing interactive fairy tales
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^12.1.3

  # UI Components
  cupertino_icons: ^1.0.2
  flutter_staggered_grid_view: ^0.7.0
  flutter_animate: ^4.3.0
  lottie: ^2.7.0
  rive: ^0.12.4

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0

  # Firebase & Cloud
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  firebase_analytics: ^10.7.4

  # Audio & Media
  just_audio: ^0.9.35
  file_picker: ^6.1.1
  image_picker: ^1.0.4
  permission_handler: ^11.0.1

  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.2

  # Utilities
  path_provider: ^2.1.1
  uuid: ^4.2.1
  equatable: ^2.0.5
  json_annotation: ^4.8.1
  intl: ^0.18.1
  shared_preferences: ^2.2.2

  # AI & Text Processing
  flutter_tts: ^3.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/audio/
    - assets/animations/
    - assets/fonts/
    - assets/icons/
  
  fonts:
    - family: FairyTale
      fonts:
        - asset: assets/fonts/FairyTale-Regular.ttf
        - asset: assets/fonts/FairyTale-Bold.ttf
          weight: 700